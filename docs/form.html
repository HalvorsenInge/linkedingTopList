<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Submit Score - LinkedIn Games Leaderboard</title>
  <link rel="stylesheet" href="../src/styles/style.css">
</head>
<body>
  <div class="container">
    <h1>🎮 Submit Your Score</h1>

    <form id="scoreForm">
      <div class="form-row">
        <div class="form-group">
          <label for="player">Player</label>
          <select id="player" required>
            <option value="">Select a player...</option>
          </select>
        </div>

        <div class="form-group">
          <label for="game">Game</label>
          <select id="game" required onchange="updateScoreLabel()">
            <option value="">Select a game...</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="score" id="scoreLabel">Score</label>
          <input type="text" id="score" placeholder="Enter score (time: MM:SS or seconds, steps: number)" required>
          <small id="scoreHint" style="color: #666; margin-top: 5px; display: block;"></small>
        </div>

        <div class="form-group">
          <label for="date">Date</label>
          <input type="date" id="date" required>
        </div>
      </div>

      <button type="submit">📤 Submit Score</button>
    </form>

    <div style="text-align: center; margin-top: 30px;">
      <a href="leaderboard.html" style="display: inline-block; margin-right: 20px; padding: 12px 30px; background: #667eea; color: white; text-decoration: none; border-radius: 6px; font-weight: 600;">📊 View Leaderboard</a>
      <a href="admin.html" style="display: inline-block; padding: 12px 30px; background: #764ba2; color: white; text-decoration: none; border-radius: 6px; font-weight: 600;">⚙️ Admin Panel</a>
    </div>
  </div>

  <script src="../src/js/utils.js"></script>
  <script src="../src/js/form.js"></script>
</body>
</html>
